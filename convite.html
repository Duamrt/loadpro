<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aceitar Convite — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/style.css?v=03290504">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03290504"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        
        <span style="color:var(--primary)">LOAD</span><span style="color:#fff">PRO</span>
      </div>
      <div class="card auth-card">
        <h2 style="text-align:center;margin-bottom:8px">Bem-vindo ao LoadPro!</h2>
        <p style="text-align:center;margin-bottom:24px;font-size:.9rem" id="conviteMsg">Seu personal te convidou. Crie uma senha para acessar seus treinos.</p>

        <div id="alert" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>

        <div id="conviteValido">
          <div class="card" style="background:var(--bg-card-hover);margin-bottom:20px;padding:16px;text-align:center">
            <div style="font-size:.85rem;color:var(--text-muted)">Personal</div>
            <div style="font-weight:600;font-size:1.1rem" id="personalNome">—</div>
          </div>

          <form id="formConvite">
            <div class="form-group">
              <label>Seu email</label>
              <input type="email" class="form-control" id="email" disabled>
            </div>
            <div class="form-group">
              <label>Crie uma senha</label>
              <div class="pwd-wrap">
                <input type="password" class="form-control" id="senha" minlength="6" placeholder="Mínimo 6 caracteres" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnAceitar">
              <i data-lucide="check-circle"></i> Acessar meus treinos
            </button>
          </form>
        </div>

        <div id="conviteJaUsado" style="display:none;text-align:center">
          <i data-lucide="check-circle" style="width:48px;height:48px;color:var(--success);margin-bottom:16px"></i>
          <h3>Você já tem conta!</h3>
          <p style="font-size:.9rem;margin-top:8px">Seu acesso já foi criado. Faça login com seu email e senha.</p>
          <a href="login.html" class="btn btn-primary btn-lg" style="margin-top:20px;display:inline-flex;align-items:center;gap:8px">
            <i data-lucide="log-in"></i> Fazer login
          </a>
        </div>

        <div id="conviteInvalido" style="display:none;text-align:center">
          <i data-lucide="alert-circle" style="width:48px;height:48px;color:var(--danger);margin-bottom:16px"></i>
          <h3>Convite inválido</h3>
          <p style="font-size:.9rem;margin-top:8px">Este link de convite não é válido. Peça um novo convite ao seu personal.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03290504"></script>
  <script src="js/supabase.js?v=03290504"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    (async () => {
      if (!token) { mostrarInvalido(); return; }

      // Buscar convite via RPC (SECURITY DEFINER, sem problema de RLS)
      const { data: aluno, error: rpcError } = await supabase.rpc('buscar_convite', { p_token: token });

      if (!aluno) { mostrarInvalido(); return; }

      // Convite já aceito — redirecionar pra login
      if (aluno.user_id) { mostrarJaUsado(); return; }

      document.getElementById('personalNome').textContent = aluno.personal_nome || 'Seu Personal';

      // Mostrar email real do aluno (cadastrado pelo personal)
      const emailAluno = aluno.email;
      document.getElementById('email').value = emailAluno || 'Email não cadastrado';
      if (!emailAluno) {
        document.getElementById('alert').textContent = 'Seu personal não cadastrou seu email. Peça para ele atualizar seus dados.';
        document.getElementById('alert').style.display = 'flex';
      }

      document.getElementById('formConvite').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnAceitar');
        const alertEl = document.getElementById('alert');
        alertEl.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Criando acesso...';

        try {
          const email = emailAluno;
          if (!email) throw new Error('Email não cadastrado. Peça ao seu personal.');

          const senha = document.getElementById('senha').value;

          // Criar auth user (ou logar se já existe de tentativa anterior)
          let authData;
          const { data: signUpData, error: authErr } = await supabase.auth.signUp({
            email,
            password: senha,
            options: { data: { nome: aluno.nome || 'Aluno', tipo: 'aluno' } }
          });

          if (authErr) {
            // Se email já existe, tentar login com a senha informada
            if (authErr.message.includes('already registered') || authErr.message.includes('already been registered')) {
              const { data: signInData, error: signInErr } = await supabase.auth.signInWithPassword({ email, password: senha });
              if (signInErr) throw new Error('Email já cadastrado. Tente fazer login ou use outra senha.');
              authData = signInData;
            } else {
              throw authErr;
            }
          } else {
            authData = signUpData;
          }

          // RPC atomica: cria user + vincula aluno (SECURITY DEFINER, sem RLS)
          const { data: result, error: rpcErr } = await supabase.rpc('aceitar_convite', {
            p_token: token,
            p_auth_id: authData.user.id
          });
          if (rpcErr) throw rpcErr;
          if (result?.error) throw new Error(result.error);

          window.location.href = 'aluno/dashboard.html';
        } catch (err) {
          alertEl.textContent = err.message;
          alertEl.style.display = 'flex';
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="check-circle"></i> Acessar meus treinos';
        }
        lucide.createIcons();
      });
    })();

    function mostrarJaUsado() {
      document.getElementById('conviteValido').style.display = 'none';
      document.getElementById('conviteJaUsado').style.display = 'block';
      lucide.createIcons();
    }

    function mostrarInvalido() {
      document.getElementById('conviteValido').style.display = 'none';
      document.getElementById('conviteInvalido').style.display = 'block';
    }

    lucide.createIcons();
  </script>
</body>
</html>

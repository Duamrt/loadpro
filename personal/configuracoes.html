<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações — LoadPro</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <h1>Configurações</h1>
      </div>

      <!-- Perfil -->
      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Meu Perfil</h3>
        <div class="grid grid-2">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" class="form-control" id="cfgNome">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="cfgEmail" disabled>
          </div>
          <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" class="form-control" id="cfgTelefone">
          </div>
        </div>
        <button class="btn btn-primary" onclick="salvarPerfil()"><i data-lucide="save"></i> Salvar</button>
      </div>

      <!-- Plano -->
      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Meu Plano</h3>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div>
            <span class="badge badge-primary" style="font-size:.9rem;padding:8px 16px" id="cfgPlano">—</span>
          </div>
          <div>
            <div style="font-size:.85rem;color:var(--text-muted)">Status: <strong id="cfgStatus">—</strong></div>
            <div style="font-size:.85rem;color:var(--text-muted)">Vencimento: <strong id="cfgVenc">—</strong></div>
          </div>
        </div>
      </div>

      <!-- Alterar senha -->
      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Alterar Senha</h3>
        <div class="grid grid-2">
          <div class="form-group">
            <label>Nova senha</label>
            <input type="password" class="form-control" id="cfgNovaSenha" minlength="6">
          </div>
          <div class="form-group">
            <label>Confirmar nova senha</label>
            <input type="password" class="form-control" id="cfgConfirma">
          </div>
        </div>
        <button class="btn btn-secondary" onclick="alterarSenha()"><i data-lucide="lock"></i> Alterar Senha</button>
      </div>

      <!-- Logout -->
      <button class="btn btn-danger" onclick="logout()"><i data-lucide="log-out"></i> Sair da conta</button>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    document.addEventListener('auth-ready', () => {
      const user = window.currentUser;
      const personal = window.currentPersonal;

      document.getElementById('cfgNome').value = user.nome;
      document.getElementById('cfgEmail').value = user.email;
      document.getElementById('cfgTelefone').value = personal?.telefone || '';
      document.getElementById('cfgPlano').textContent = (personal?.plano || 'starter').toUpperCase();
      document.getElementById('cfgStatus').textContent = personal?.status_assinatura || '—';
      document.getElementById('cfgVenc').textContent = personal?.data_vencimento ? formatDate(personal.data_vencimento) : '—';

      maskPhone(document.getElementById('cfgTelefone'));
    });

    async function salvarPerfil() {
      const nome = document.getElementById('cfgNome').value.trim();
      const telefone = document.getElementById('cfgTelefone').value.trim();

      await supabase.from('users').update({ nome }).eq('id', window.currentUser.id);
      await supabase.from('personals').update({ telefone }).eq('id', window.currentPersonal.id);
      showToast('Perfil atualizado!');
    }

    async function alterarSenha() {
      const nova = document.getElementById('cfgNovaSenha').value;
      const confirma = document.getElementById('cfgConfirma').value;
      if (nova !== confirma) { showToast('Senhas não conferem', 'error'); return; }
      if (nova.length < 6) { showToast('Mínimo 6 caracteres', 'error'); return; }

      const { error } = await supabase.auth.updateUser({ password: nova });
      if (error) { showToast('Erro: ' + error.message, 'error'); return; }
      showToast('Senha alterada!');
      document.getElementById('cfgNovaSenha').value = '';
      document.getElementById('cfgConfirma').value = '';
    }
  </script>
</body>
</html>

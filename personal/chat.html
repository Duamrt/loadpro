<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Satoshi:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=04101028">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=04101028"></script>
  <style>
    .chat-list-item { display:flex; align-items:center; gap:12px; padding:14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s; }
    .chat-list-item:hover { background:var(--bg-card-hover); }
    .chat-area { display:flex; flex-direction:column; height:calc(100vh - 120px); }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; }
    .chat-input-area { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); align-items:flex-end; }
    .msg-foto { max-width:100%; max-width:min(100%, 280px); border-radius:8px; margin-bottom:4px; cursor:pointer; }
    .btn-foto { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:8px; min-width:40px; min-height:40px; display:flex; align-items:center; justify-content:center; }
    .btn-foto:hover { color:var(--primary); }
    .foto-input { display:none; }
    .foto-preview { position:relative; padding:8px 16px; }
    .foto-preview img { max-height:100px; border-radius:8px; }
    .foto-preview .remove { position:absolute; top:0; right:8px; background:var(--danger); color:#fff; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:.75rem; display:flex; align-items:center; justify-content:center; }
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999; display:none; align-items:center; justify-content:center; cursor:pointer; }
    .lightbox.active { display:flex; }
    .msg-tick { font-size:.75rem; letter-spacing:-1px; opacity:.85; font-weight:700; }
    .msg-tick.lida { color:#4dd9ff; opacity:1; }
    .lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; border-radius:8px; }
    .uploading { opacity:.5; pointer-events:none; }
    .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; }
  </style>
<script>if(localStorage.getItem("loadpro-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <h1>Chat</h1>
      </div>

      <div class="grid grid-2 chat-layout" style="gap:0;height:calc(100vh - 140px)">
        <!-- Lista de conversas -->
        <div class="card chat-list" id="chatList" style="border-radius:var(--radius) 0 0 var(--radius);overflow-y:auto"></div>

        <!-- Área do chat -->
        <div class="card chat-area" id="chatArea" style="border-radius:0 var(--radius) var(--radius) 0;border-left:0;display:flex;flex-direction:column">
          <div id="chatHeader" style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;display:flex;align-items:center;gap:12px">
            <button class="btn btn-sm btn-secondary chat-back-mobile" onclick="voltarListaChat()" style="padding:8px"><i data-lucide="arrow-left" style="width:16px;height:16px"></i></button>
            <span id="chatHeaderName">Selecione um aluno</span>
          </div>
          <div id="chatMessages" style="flex:1;overflow-y:auto;padding:16px"></div>
          <div class="foto-preview" id="fotoPreview" style="display:none">
            <img id="fotoPreviewImg" src="">
            <button class="remove" onclick="limparFoto()">&times;</button>
          </div>
          <div class="chat-input-area" id="chatInputArea" style="display:none">
            <button class="btn-foto" onclick="document.getElementById('fotoInput').click()" title="Enviar foto">
              <i data-lucide="image" style="width:20px;height:20px"></i>
            </button>
            <input type="file" id="fotoInput" class="foto-input" accept="image/jpeg,image/png,image/webp">
            <input type="text" class="form-control" id="chatInput" placeholder="Digite..." style="flex:1">
            <button class="btn btn-primary btn-sm" onclick="enviarMsg()"><i data-lucide="send"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=04101028"></script>
  <script src="../js/supabase.js?v=04101028"></script>
  <script src="../js/auth.js?v=04101028"></script>
  <script src="../js/sidebar.js?v=04101028"></script>
  <script src="../js/utils.js?v=04101028"></script>
  <script>
    let alunoChat = null;
    let subscription = null;
    let fotoFile = null;

    // Pedir permissão de notificação
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    function notificarMsg(nome, texto) {
      if (document.hasFocus()) return;
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('LoadPro — ' + nome, {
          body: texto || 'Enviou uma foto',
          icon: '/favicon.svg',
          tag: 'loadpro-chat'
        });
      }
    }

    function voltarListaChat() {
      document.getElementById('chatList').classList.remove('hidden-mobile');
      document.getElementById('chatArea').classList.remove('show-mobile');
    }

    function limparFoto() {
      fotoFile = null;
      document.getElementById('fotoPreview').style.display = 'none';
      document.getElementById('fotoInput').value = '';
    }

    function abrirFoto(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('active');
    }

    document.addEventListener('auth-ready', async () => {
      const personal = window.currentPersonal;

      // Listar alunos com ultima msg e nao-lidas
      const { data: alunos } = await supabase
        .from('alunos').select('id, nome')
        .eq('personal_id', personal.id).in('status', ['ativo','pendente']).order('nome');

      // Contar nao-lidas por aluno
      const unreadMap = {};
      if (alunos?.length) {
        const { data: unread } = await supabase
          .from('mensagens').select('aluno_id')
          .in('aluno_id', alunos.map(a => a.id))
          .eq('lida', false)
          .neq('remetente_id', window.currentUser.id);
        (unread || []).forEach(m => { unreadMap[m.aluno_id] = (unreadMap[m.aluno_id] || 0) + 1; });
      }

      const list = document.getElementById('chatList');
      list.innerHTML = (alunos || []).map(a => `
        <div class="chat-list-item" id="cli-${a.id}" onclick="abrirChat('${a.id}', '${esc(a.nome)}')">
          <div class="avatar" style="width:36px;height:36px;font-size:.8rem">${getInitials(a.nome)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:.9rem">${esc(a.nome)}</div>
          </div>
          ${unreadMap[a.id] ? '<div class="unread-dot"></div>' : ''}
        </div>
      `).join('') || '<p style="padding:20px;color:var(--text-muted)">Nenhum aluno ativo</p>';

      document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') enviarMsg();
      });

      // Foto selecionada
      document.getElementById('fotoInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { showToast('Foto muito grande (max 10MB)', 'error'); return; }
        fotoFile = file;
        const reader = new FileReader();
        reader.onload = () => {
          document.getElementById('fotoPreviewImg').src = reader.result;
          document.getElementById('fotoPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      });

      lucide.createIcons();
    });

    async function abrirChat(alunoId, nome) {
      alunoChat = alunoId;
      document.getElementById('chatHeaderName').textContent = nome;
      document.getElementById('chatList').classList.add('hidden-mobile');
      document.getElementById('chatArea').classList.add('show-mobile');
      document.getElementById('chatInputArea').style.display = 'flex';
      limparFoto();

      // Remover dot de nao-lida
      const dot = document.querySelector(`#cli-${alunoId} .unread-dot`);
      if (dot) dot.remove();

      const { data: msgs } = await supabase
        .from('mensagens').select('*')
        .eq('aluno_id', alunoId)
        .order('criado_em', { ascending: true })
        .limit(100);

      renderMsgs(msgs || []);

      // Marcar como lidas
      await supabase.from('mensagens').update({ lida: true })
        .eq('aluno_id', alunoId).eq('lida', false).neq('remetente_id', window.currentUser.id);

      // Polling confiável a cada 2s
      if (window._chatPoll) clearInterval(window._chatPoll);
      window._chatLastId = msgs?.length ? msgs[msgs.length - 1].id : null;

      window._chatPoll = setInterval(async () => {
        if (alunoChat !== alunoId) return;
        const query = supabase.from('mensagens').select('*')
          .eq('aluno_id', alunoId)
          .order('criado_em', { ascending: false })
          .limit(10);

        const { data: recentes } = await query;
        if (!recentes?.length) return;

        recentes.reverse().forEach(m => {
          if (!document.getElementById('msg-' + m.id)) {
            appendMsg(m);
            if (m.remetente_id !== window.currentUser.id) {
              supabase.from('mensagens').update({ lida: true }).eq('id', m.id);
              notificarMsg(nome, m.texto);
            }
          }
          // Atualizar ticks de leitura nas minhas msgs
          if (m.remetente_id === window.currentUser.id && m.lida) {
            const el = document.getElementById('msg-' + m.id);
            if (el) {
              const tick = el.querySelector('.msg-tick');
              if (tick && !tick.classList.contains('lida')) {
                tick.textContent = '✓✓';
                tick.classList.add('lida');
              }
            }
          }
        });
      }, 2000);
    }

    function renderMsgs(msgs) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = msgs.map(m => msgHTML(m)).join('');
      container.scrollTop = container.scrollHeight;
    }

    function appendMsg(m) {
      const container = document.getElementById('chatMessages');
      if (document.getElementById('msg-' + m.id)) return;
      container.insertAdjacentHTML('beforeend', msgHTML(m));
      container.scrollTop = container.scrollHeight;
    }

    function msgHTML(m) {
      const mine = m.remetente_id === window.currentUser.id;
      const hora = new Date(m.criado_em).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      let conteudo = '';
      if (m.foto_url) {
        conteudo += `<img src="${esc(m.foto_url)}" class="msg-foto" onclick="event.stopPropagation();abrirFoto('${esc(m.foto_url)}')" loading="lazy">`;
      }
      if (m.texto) conteudo += esc(m.texto);

      let ticks = '';
      if (mine) {
        const isTemp = String(m.id).startsWith('temp-');
        if (isTemp) {
          ticks = '<span class="msg-tick">✓</span>';
        } else if (m.lida) {
          ticks = '<span class="msg-tick lida">✓✓</span>';
        } else {
          ticks = '<span class="msg-tick">✓✓</span>';
        }
      }

      return `
        <div id="msg-${m.id}" style="display:flex;justify-content:${mine ? 'flex-end' : 'flex-start'};margin-bottom:8px">
          <div style="max-width:70%;padding:10px 14px;border-radius:12px;font-size:.9rem;
            background:${mine ? 'var(--primary)' : 'var(--bg-card-hover)'};
            color:${mine ? '#fff' : 'var(--text)'}">
            ${conteudo}
            <div style="font-size:.7rem;margin-top:4px;opacity:.6;display:flex;align-items:center;gap:4px;justify-content:flex-end">${hora} ${ticks}</div>
          </div>
        </div>
      `;
    }

    async function enviarMsg() {
      const input = document.getElementById('chatInput');
      const texto = input.value.trim();
      if (!texto && !fotoFile) return;
      if (!alunoChat) return;

      const bar = document.getElementById('chatInputArea');
      bar.classList.add('uploading');
      input.value = '';

      let foto_url = null;

      if (fotoFile) {
        const ext = fotoFile.name.split('.').pop().toLowerCase();
        const path = `${window.currentSession.user.id}/${alunoChat}/${Date.now()}.${ext}`;
        const { error } = await supabase.storage
          .from('fotos-progresso').upload(path, fotoFile, { contentType: fotoFile.type });
        if (error) {
          showToast('Erro ao enviar foto', 'error');
          bar.classList.remove('uploading');
          return;
        }
        const { data: urlData } = supabase.storage.from('fotos-progresso').getPublicUrl(path);
        foto_url = urlData.publicUrl;
        limparFoto();
      }

      // Mostrar mensagem instantaneamente (optimistic UI)
      const tempId = 'temp-' + Date.now();
      appendMsg({
        id: tempId,
        remetente_id: window.currentUser.id,
        texto: texto || null,
        foto_url,
        criado_em: new Date().toISOString()
      });

      bar.classList.remove('uploading');

      // Salvar no banco
      const { data: msgSalva, error: msgErr } = await supabase.from('mensagens').insert({
        personal_id: window.currentPersonal.id,
        aluno_id: alunoChat,
        remetente_id: window.currentUser.id,
        texto: texto || null,
        foto_url
      }).select().single();

      if (msgErr) {
        console.error('Erro insert msg:', msgErr);
        showToast('Erro ao enviar: ' + msgErr.message, 'error');
      } else if (msgSalva) {
        // Trocar msg temp pela real (com ID do banco e ticks corretos)
        const tempEl = document.getElementById('msg-' + tempId);
        if (tempEl) tempEl.remove();
        appendMsg(msgSalva);
      }
    }
  </script>
</body>
</html>

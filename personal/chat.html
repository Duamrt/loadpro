<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03281447">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03281447"></script>
  <style>
    .chat-list-item { display:flex; align-items:center; gap:12px; padding:14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s; }
    .chat-list-item:hover { background:var(--bg-card-hover); }
    .chat-area { display:flex; flex-direction:column; height:calc(100vh - 120px); }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; }
    .chat-input-area { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <h1>Chat</h1>
      </div>

      <div class="grid grid-2 chat-layout" style="gap:0;height:calc(100vh - 140px)">
        <!-- Lista de conversas -->
        <div class="card chat-list" id="chatList" style="border-radius:var(--radius) 0 0 var(--radius);overflow-y:auto"></div>

        <!-- Área do chat -->
        <div class="card chat-area" id="chatArea" style="border-radius:0 var(--radius) var(--radius) 0;border-left:0;display:flex;flex-direction:column">
          <div id="chatHeader" style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;display:flex;align-items:center;gap:12px">
            <button class="btn btn-sm btn-secondary chat-back-mobile" onclick="voltarListaChat()" style="padding:8px"><i data-lucide="arrow-left" style="width:16px;height:16px"></i></button>
            <span id="chatHeaderName">Selecione um aluno</span>
          </div>
          <div id="chatMessages" style="flex:1;overflow-y:auto;padding:16px"></div>
          <div class="chat-input-area" id="chatInputArea" style="display:none">
            <input type="text" class="form-control" id="chatInput" placeholder="Digite..." style="flex:1">
            <button class="btn btn-primary btn-sm" onclick="enviarMsg()"><i data-lucide="send"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03281447"></script>
  <script src="../js/supabase.js?v=03281447"></script>
  <script src="../js/auth.js?v=03281447"></script>
  <script src="../js/sidebar.js?v=03281447"></script>
  <script src="../js/utils.js?v=03281447"></script>
  <script>
    let alunoChat = null;
    let subscription = null;

    function voltarListaChat() {
      document.getElementById('chatList').classList.remove('hidden-mobile');
      document.getElementById('chatArea').classList.remove('show-mobile');
    }

    document.addEventListener('auth-ready', async () => {
      const personal = window.currentPersonal;

      // Listar alunos com última mensagem
      const { data: alunos } = await supabase
        .from('alunos').select('id, nome')
        .eq('personal_id', personal.id).eq('status', 'ativo').order('nome');

      const list = document.getElementById('chatList');
      list.innerHTML = (alunos || []).map(a => `
        <div class="chat-list-item" onclick="abrirChat('${a.id}', '${esc(a.nome)}')">
          <div class="avatar" style="width:36px;height:36px;font-size:.8rem">${getInitials(a.nome)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:.9rem">${esc(a.nome)}</div>
          </div>
        </div>
      `).join('') || '<p style="padding:20px;color:var(--text-muted)">Nenhum aluno ativo</p>';

      document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') enviarMsg();
      });
    });

    async function abrirChat(alunoId, nome) {
      alunoChat = alunoId;
      document.getElementById('chatHeaderName').textContent = nome;
      // Mobile: esconder lista, mostrar chat
      document.getElementById('chatList').classList.add('hidden-mobile');
      document.getElementById('chatArea').classList.add('show-mobile');
      document.getElementById('chatInputArea').style.display = 'flex';

      // Highlight
      document.querySelectorAll('.chat-list-item').forEach(el => el.style.background = '');

      const { data: msgs } = await supabase
        .from('mensagens')
        .select('*')
        .eq('aluno_id', alunoId)
        .order('criado_em', { ascending: true })
        .limit(100);

      renderMsgs(msgs || []);

      // Marcar como lidas
      await supabase.from('mensagens').update({ lida: true })
        .eq('aluno_id', alunoId).eq('lida', false).neq('remetente_id', window.currentUser.id);

      // Realtime
      if (subscription) subscription.unsubscribe();
      subscription = supabase.channel('chat-' + alunoId)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensagens', filter: `aluno_id=eq.${alunoId}` }, payload => {
          appendMsg(payload.new);
        })
        .subscribe();
    }

    function renderMsgs(msgs) {
      const container = document.getElementById('chatMessages');
      const myId = window.currentUser.id;
      container.innerHTML = msgs.map(m => msgHTML(m, myId)).join('');
      container.scrollTop = container.scrollHeight;
    }

    function appendMsg(m) {
      const container = document.getElementById('chatMessages');
      container.insertAdjacentHTML('beforeend', msgHTML(m, window.currentUser.id));
      container.scrollTop = container.scrollHeight;
    }

    function msgHTML(m, myId) {
      const mine = m.remetente_id === myId;
      return `
        <div style="display:flex;justify-content:${mine ? 'flex-end' : 'flex-start'};margin-bottom:8px">
          <div style="max-width:70%;padding:10px 14px;border-radius:12px;font-size:.9rem;
            background:${mine ? 'var(--primary)' : 'var(--bg-card-hover)'};
            color:${mine ? '#fff' : 'var(--text)'}">
            ${esc(m.texto)}
            <div style="font-size:.7rem;margin-top:4px;opacity:.6">${new Date(m.criado_em).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
          </div>
        </div>
      `;
    }

    async function enviarMsg() {
      const input = document.getElementById('chatInput');
      const texto = input.value.trim();
      if (!texto || !alunoChat) return;
      input.value = '';

      await supabase.from('mensagens').insert({
        personal_id: window.currentPersonal.id,
        aluno_id: alunoChat,
        remetente_id: window.currentUser.id,
        texto
      });
    }
  </script>
</body>
</html>

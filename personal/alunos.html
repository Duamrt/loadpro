<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alunos — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03281444">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03281444"></script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <div>
          <h1>Alunos</h1>
          <p id="subtitulo"></p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div class="search-box" style="flex:1;min-width:200px">
            <i data-lucide="search"></i>
            <input type="text" class="form-control" id="busca" placeholder="Buscar aluno...">
          </div>
          <select class="form-control" id="filtroStatus" style="width:auto;min-width:120px">
            <option value="ativo">Ativos</option>
            <option value="pendente">Pendentes</option>
            <option value="arquivado">Arquivados</option>
            <option value="">Todos</option>
          </select>
          <button class="btn btn-primary" onclick="openModal('modalAluno')" style="white-space:nowrap">
            <i data-lucide="user-plus"></i> Novo Aluno
          </button>
        </div>
      </div>

      <!-- Grid de alunos -->
      <div class="grid grid-3" id="alunosGrid">
        <div class="skeleton" style="height:180px"></div>
        <div class="skeleton" style="height:180px"></div>
        <div class="skeleton" style="height:180px"></div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none">
        <i data-lucide="users"></i>
        <h3>Nenhum aluno encontrado</h3>
        <p>Cadastre seu primeiro aluno para começar a usar o LoadPro.</p>
        <button class="btn btn-primary" onclick="openModal('modalAluno')">
          <i data-lucide="user-plus"></i> Cadastrar Aluno
        </button>
      </div>
    </main>
  </div>

  <!-- Modal Novo Aluno -->
  <div class="modal-overlay" id="modalAluno">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Novo Aluno</h3>
        <button class="modal-close" onclick="closeModal('modalAluno')"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <form id="formAluno">
          <input type="hidden" id="alunoId">
          <div class="form-group">
            <label>Nome completo *</label>
            <input type="text" class="form-control" id="alNome" required>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" class="form-control" id="alEmail" placeholder="Para envio do convite" required>
          </div>
          <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" class="form-control" id="alTelefone" placeholder="(00) 00000-0000">
          </div>
          <div class="grid grid-2">
            <div class="form-group">
              <label>Data de nascimento</label>
              <input type="date" class="form-control" id="alNascimento">
            </div>
            <div class="form-group">
              <label>Sexo</label>
              <select class="form-control" id="alSexo">
                <option value="">Selecione</option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
              </select>
            </div>
          </div>
          <div class="grid grid-2">
            <div class="form-group">
              <label>Objetivo</label>
              <select class="form-control" id="alObjetivo">
                <option value="">Selecione</option>
                <option value="Emagrecimento">Emagrecimento</option>
                <option value="Hipertrofia">Hipertrofia</option>
                <option value="Condicionamento">Condicionamento</option>
                <option value="Reabilitação">Reabilitação</option>
                <option value="Qualidade de vida">Qualidade de vida</option>
              </select>
            </div>
            <div class="form-group">
              <label>Nível</label>
              <select class="form-control" id="alNivel">
                <option value="">Selecione</option>
                <option value="iniciante">Iniciante</option>
                <option value="intermediario">Intermediário</option>
                <option value="avancado">Avançado</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalAluno')">Cancelar</button>
        <button class="btn btn-primary" id="btnSalvar" onclick="salvarAluno()">
          <i data-lucide="save"></i> Salvar e Convidar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03281444"></script>
  <script src="../js/supabase.js?v=03281444"></script>
  <script src="../js/auth.js?v=03281444"></script>
  <script src="../js/sidebar.js?v=03281444"></script>
  <script src="../js/utils.js?v=03281444"></script>
  <script src="../js/personal/alunos.js?v=03281444"></script>
</body>
</html>

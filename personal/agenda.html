<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Satoshi:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03291115">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03291115"></script>
<script>if(localStorage.getItem("loadpro-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <div>
          <h1>Agenda</h1>
          <p id="resumoAgenda" style="font-size:.85rem;color:var(--text-muted)"></p>
        </div>
        <button class="btn btn-primary" onclick="openModal('modalHorario')"><i data-lucide="plus"></i> Agendar</button>
      </div>

      <!-- Nav mobile (dia a dia) -->
      <div class="agenda-nav-mobile">
        <button onclick="navegarDia(-1)"><i data-lucide="chevron-left"></i></button>
        <span class="dia-label" id="diaLabel">Segunda</span>
        <button onclick="navegarDia(1)"><i data-lucide="chevron-right"></i></button>
      </div>

      <!-- Calendário semanal -->
      <div class="card">
        <div class="grid" id="calendarioSemanal" style="grid-template-columns:repeat(7,1fr);gap:8px"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalHorario">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Novo Horário</h3>
        <button class="modal-close" onclick="closeModal('modalHorario')"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Aluno</label>
          <select class="form-control" id="agAluno"></select>
        </div>
        <div class="form-group">
          <label>Dia da semana</label>
          <select class="form-control" id="agDia">
            <option value="seg">Segunda</option>
            <option value="ter">Terça</option>
            <option value="qua">Quarta</option>
            <option value="qui">Quinta</option>
            <option value="sex">Sexta</option>
            <option value="sab">Sábado</option>
            <option value="dom">Domingo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Horário</label>
          <input type="time" class="form-control" id="agHorario" value="07:00">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalHorario')">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarHorario()"><i data-lucide="save"></i> Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03291115"></script>
  <script src="../js/supabase.js?v=03291115"></script>
  <script src="../js/auth.js?v=03291115"></script>
  <script src="../js/sidebar.js?v=03291115"></script>
  <script src="../js/utils.js?v=03291115"></script>
  <script>
    let agendaData = [];
    let alunosMap = {};
    let horariosFunc = {};
    let duracaoSessao = 60;

    document.addEventListener('auth-ready', async () => {
      const personal = window.currentPersonal;
      duracaoSessao = personal?.duracao_sessao_min || 60;

      const { data: alunos } = await supabase
        .from('alunos').select('id, nome').eq('personal_id', personal.id).eq('status', 'ativo').order('nome');

      const select = document.getElementById('agAluno');
      (alunos || []).forEach(a => {
        select.innerHTML += `<option value="${a.id}">${esc(a.nome)}</option>`;
        alunosMap[a.id] = a.nome;
      });

      // Carregar horário de funcionamento
      const { data: hf } = await supabase
        .from('horario_funcionamento')
        .select('*')
        .eq('personal_id', personal.id);

      (hf || []).forEach(h => { horariosFunc[h.dia_semana] = h; });

      await carregarAgenda();
    });

    // Gerar slots de horário baseado no funcionamento
    function gerarSlots(dia) {
      const h = horariosFunc[dia];
      if (!h || !h.ativo) return [];

      const slots = [];
      const addSlots = (inicio, fim) => {
        if (!inicio || !fim) return;
        let [hh, mm] = inicio.substring(0, 5).split(':').map(Number);
        const [fh, fm] = fim.substring(0, 5).split(':').map(Number);
        const fimMin = fh * 60 + fm;
        while (hh * 60 + mm < fimMin) {
          slots.push(`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`);
          mm += duracaoSessao;
          if (mm >= 60) { hh += Math.floor(mm / 60); mm = mm % 60; }
        }
      };
      addSlots(h.abertura, h.fechamento);
      addSlots(h.abertura_tarde, h.fechamento_tarde);
      return slots;
    }

    async function carregarAgenda() {
      const { data } = await supabase
        .from('agenda').select('*')
        .eq('personal_id', window.currentPersonal.id)
        .eq('ativo', true)
        .order('horario');

      agendaData = data || [];
      renderCalendario();
    }

    const diasLabels = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
    let diaAtivo = new Date().getDay();
    diaAtivo = diaAtivo === 0 ? 6 : diaAtivo - 1;

    function navegarDia(delta) {
      diaAtivo = (diaAtivo + delta + 7) % 7;
      atualizarDiaVisivel();
    }

    function atualizarDiaVisivel() {
      const cols = document.querySelectorAll('#calendarioSemanal > div');
      cols.forEach((c, i) => c.classList.toggle('dia-ativo', i === diaAtivo));
      document.getElementById('diaLabel').textContent = diasLabels[diaAtivo];
    }

    function renderCalendario() {
      const dias = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab', 'dom'];
      const container = document.getElementById('calendarioSemanal');
      let totalSlots = 0, totalOcupados = 0;

      container.innerHTML = dias.map((d, i) => {
        const slots = gerarSlots(d);
        const agendados = agendaData.filter(a => a.dia_semana === d);
        const agendadosMap = {};
        agendados.forEach(a => { agendadosMap[a.horario?.substring(0, 5)] = a; });

        const hf = horariosFunc[d];
        if (!hf || !hf.ativo) {
          return `
            <div style="min-height:200px;opacity:.4" class="${i === diaAtivo ? 'dia-ativo' : ''}">
              <div style="text-align:center;font-weight:600;font-size:.85rem;padding:8px;border-bottom:1px solid var(--border);margin-bottom:8px">${diasLabels[i]}</div>
              <div style="text-align:center;font-size:.8rem;color:var(--text-muted);padding:20px 4px">Folga</div>
            </div>`;
        }

        totalSlots += slots.length;
        const ocupados = slots.filter(s => agendadosMap[s]).length;
        totalOcupados += ocupados;

        return `
          <div style="min-height:200px" class="${i === diaAtivo ? 'dia-ativo' : ''}">
            <div style="text-align:center;font-weight:600;font-size:.85rem;padding:8px;border-bottom:1px solid var(--border);margin-bottom:8px">
              ${diasLabels[i]}
              <div style="font-size:.7rem;font-weight:400;color:${ocupados === slots.length ? 'var(--danger)' : 'var(--success)'}">${ocupados}/${slots.length}</div>
            </div>
            ${slots.map(horario => {
              const ag = agendadosMap[horario];
              if (ag) {
                return `
                  <div style="background:var(--primary-light);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:.8rem;position:relative">
                    <div style="font-weight:600;color:var(--primary)">${horario}</div>
                    <div style="color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(alunosMap[ag.aluno_id] || 'Aluno')}</div>
                    <button onclick="deletarHorario('${ag.id}')" style="position:absolute;top:6px;right:4px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:8px;min-width:44px;min-height:44px"><i data-lucide="x" style="width:12px;height:12px"></i></button>
                  </div>`;
              } else {
                return `
                  <div style="border:1px dashed var(--border);border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:.8rem;cursor:pointer;transition:background .15s"
                       onclick="agendarSlot('${d}','${horario}')"
                       onmouseover="this.style.background='var(--bg-card-hover)'" onmouseout="this.style.background=''">
                    <div style="color:var(--text-muted)">${horario}</div>
                    <div style="font-size:.75rem;color:var(--text-muted)">Livre</div>
                  </div>`;
              }
            }).join('')}
          </div>`;
      }).join('');

      // Resumo geral
      const livres = totalSlots - totalOcupados;
      document.getElementById('resumoAgenda').textContent = `${totalOcupados} agendados · ${livres} vagas livres · ${duracaoSessao}min/sessão`;

      lucide.createIcons();
      document.getElementById('diaLabel').textContent = diasLabels[diaAtivo];
    }

    function agendarSlot(dia, horario) {
      document.getElementById('agDia').value = dia;
      document.getElementById('agHorario').value = horario;
      openModal('modalHorario');
    }

    async function salvarHorario() {
      const { error } = await supabase.from('agenda').insert({
        personal_id: window.currentPersonal.id,
        aluno_id: document.getElementById('agAluno').value,
        dia_semana: document.getElementById('agDia').value,
        horario: document.getElementById('agHorario').value
      });
      if (error) { showToast('Erro: ' + error.message, 'error'); return; }
      closeModal('modalHorario');
      showToast('Horário agendado!');
      await carregarAgenda();
    }

    async function deletarHorario(id) {
      await supabase.from('agenda').delete().eq('id', id);
      showToast('Horário removido');
      await carregarAgenda();
    }
  </script>
</body>
</html>

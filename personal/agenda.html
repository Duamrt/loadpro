<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — LoadPro</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <h1>Agenda</h1>
        <button class="btn btn-primary" onclick="openModal('modalHorario')"><i data-lucide="plus"></i> Novo Horário</button>
      </div>

      <!-- Calendário semanal -->
      <div class="card">
        <div class="grid" style="grid-template-columns:repeat(7,1fr);gap:8px" id="calendarioSemanal"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalHorario">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Novo Horário</h3>
        <button class="modal-close" onclick="closeModal('modalHorario')"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Aluno</label>
          <select class="form-control" id="agAluno"></select>
        </div>
        <div class="form-group">
          <label>Dia da semana</label>
          <select class="form-control" id="agDia">
            <option value="seg">Segunda</option>
            <option value="ter">Terça</option>
            <option value="qua">Quarta</option>
            <option value="qui">Quinta</option>
            <option value="sex">Sexta</option>
            <option value="sab">Sábado</option>
            <option value="dom">Domingo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Horário</label>
          <input type="time" class="form-control" id="agHorario" value="07:00">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalHorario')">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarHorario()"><i data-lucide="save"></i> Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let agendaData = [];
    let alunosMap = {};

    document.addEventListener('auth-ready', async () => {
      const personal = window.currentPersonal;

      const { data: alunos } = await supabase
        .from('alunos').select('id, nome').eq('personal_id', personal.id).eq('status', 'ativo').order('nome');

      const select = document.getElementById('agAluno');
      (alunos || []).forEach(a => {
        select.innerHTML += `<option value="${a.id}">${esc(a.nome)}</option>`;
        alunosMap[a.id] = a.nome;
      });

      await carregarAgenda();
    });

    async function carregarAgenda() {
      const { data } = await supabase
        .from('agenda').select('*')
        .eq('personal_id', window.currentPersonal.id)
        .eq('ativo', true)
        .order('horario');

      agendaData = data || [];
      renderCalendario();
    }

    function renderCalendario() {
      const dias = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab', 'dom'];
      const labels = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
      const container = document.getElementById('calendarioSemanal');

      container.innerHTML = dias.map((d, i) => {
        const slots = agendaData.filter(a => a.dia_semana === d);
        return `
          <div style="min-height:200px">
            <div style="text-align:center;font-weight:600;font-size:.85rem;padding:8px;border-bottom:1px solid var(--border);margin-bottom:8px">${labels[i]}</div>
            ${slots.length ? slots.map(s => `
              <div style="background:var(--primary-light);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:8px;margin-bottom:6px;font-size:.8rem;position:relative">
                <div style="font-weight:600;color:var(--primary)">${s.horario?.substring(0, 5)}</div>
                <div style="color:var(--text-secondary)">${esc(alunosMap[s.aluno_id] || 'Aluno')}</div>
                <button onclick="deletarHorario('${s.id}')" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.7rem"><i data-lucide="x" style="width:12px;height:12px"></i></button>
              </div>
            `).join('') : '<div style="text-align:center;font-size:.8rem;color:var(--text-muted);padding:20px 4px">Livre</div>'}
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function salvarHorario() {
      const { error } = await supabase.from('agenda').insert({
        personal_id: window.currentPersonal.id,
        aluno_id: document.getElementById('agAluno').value,
        dia_semana: document.getElementById('agDia').value,
        horario: document.getElementById('agHorario').value
      });
      if (error) { showToast('Erro: ' + error.message, 'error'); return; }
      closeModal('modalHorario');
      showToast('Horário adicionado!');
      await carregarAgenda();
    }

    async function deletarHorario(id) {
      await supabase.from('agenda').delete().eq('id', id);
      showToast('Horário removido');
      await carregarAgenda();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treinos — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03281632">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03281632"></script>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="main-header">
        <div>
          <h1>Treinos</h1>
          <p>Monte e gerencie rotinas de treino</p>
        </div>
        <button class="btn btn-primary" onclick="novaRotina()"><i data-lucide="plus"></i> Nova Rotina</button>
      </div>

      <!-- Seletor de aluno -->
      <div class="card" style="margin-bottom:24px;padding:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <label style="font-weight:600;white-space:nowrap">Aluno:</label>
          <select class="form-control" id="seletorAluno" style="max-width:300px">
            <option value="">Selecione um aluno</option>
          </select>
        </div>
      </div>

      <!-- Lista de rotinas -->
      <div id="rotinasContainer"></div>
      <div id="emptyState" class="empty-state" style="display:none">
        <i data-lucide="clipboard-list"></i>
        <h3>Nenhuma rotina</h3>
        <p>Selecione um aluno e crie sua primeira rotina de treino.</p>
      </div>
    </main>
  </div>

  <!-- Modal Nova/Editar Rotina -->
  <div class="modal-overlay" id="modalRotina">
    <div class="modal" style="max-width:700px">
      <div class="modal-header">
        <h3 id="rotinaModalTitle">Nova Rotina</h3>
        <button class="modal-close" onclick="closeModal('modalRotina')"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rotinaId">
        <div class="form-group">
          <label>Nome da rotina *</label>
          <input type="text" class="form-control" id="rotinaNome" placeholder="Ex: Push, Pull, Legs 1, Upper">
        </div>
        <div class="form-group">
          <label>Dias da semana</label>
          <div class="chip-group" id="rotinaDias"></div>
        </div>

        <h4 style="margin:20px 0 12px">Exercícios</h4>
        <div id="listaExercicios" style="margin-bottom:16px"></div>

        <div style="display:flex;gap:8px">
          <select class="form-control" id="addExSelect" style="flex:1">
            <option value="">Adicionar exercício...</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="adicionarExercicio()"><i data-lucide="plus"></i></button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modalRotina')">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarRotina()"><i data-lucide="save"></i> Salvar Rotina</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03281632"></script>
  <script src="../js/supabase.js?v=03281632"></script>
  <script src="../js/auth.js?v=03281632"></script>
  <script src="../js/sidebar.js?v=03281632"></script>
  <script src="../js/utils.js?v=03281632"></script>
  <script src="../js/personal/treinos.js?v=03281632"></script>
</body>
</html>

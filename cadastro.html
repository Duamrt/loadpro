<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — LoadPro</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .auth-box { width:100%; max-width:460px; }
    .auth-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:32px; font-size:1.4rem; font-weight:800; }
    .auth-logo span { color:var(--primary); }
    .auth-card { padding:32px; }
    .auth-card h2 { text-align:center; margin-bottom:8px; }
    .auth-card p { text-align:center; margin-bottom:24px; font-size:.9rem; }
    .auth-footer { text-align:center; margin-top:20px; font-size:.9rem; }
    .pwd-wrap { position:relative; }
    .pwd-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; }
    .trial-badge { text-align:center; margin-bottom:24px; }
    .trial-badge span { background:var(--success-light); color:var(--success); padding:6px 16px; border-radius:100px; font-size:.85rem; font-weight:600; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <i data-lucide="dumbbell" style="width:32px;height:32px;color:var(--primary)"></i>
        Load<span>Pro</span>
      </div>
      <div class="card auth-card">
        <h2>Crie sua conta</h2>
        <p>7 dias grátis para testar tudo. Sem cartão.</p>

        <div class="trial-badge">
          <span><i data-lucide="gift" style="width:14px;height:14px;vertical-align:-2px"></i> Trial gratuito de 7 dias</span>
        </div>

        <div id="alert" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div id="success" class="alert alert-success" style="display:none;margin-bottom:16px"></div>

        <form id="cadastroForm">
          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label>WhatsApp</label>
            <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
          </div>
          <div class="form-group">
            <label>Plano</label>
            <select class="form-control" id="plano">
              <option value="starter">Starter — até 10 alunos (R$ 99/mês)</option>
              <option value="pro">Pro — até 20 alunos (R$ 179/mês)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <div class="pwd-wrap">
              <input type="password" class="form-control" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
              <button type="button" class="pwd-toggle" onclick="togglePwd()"><i data-lucide="eye" id="eyeIcon"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" class="form-control" id="senha2" placeholder="Repita a senha" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnCadastro" style="margin-top:8px">
            <i data-lucide="user-plus"></i> Criar minha conta
          </button>
        </form>

        <div class="auth-footer">
          Já tem conta? <a href="login.html">Entrar</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Pre-select plano from URL
    const params = new URLSearchParams(location.search);
    if (params.get('plano') === 'pro') document.getElementById('plano').value = 'pro';

    function togglePwd() {
      const inp = document.getElementById('senha');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') { inp.type = 'text'; ico.setAttribute('data-lucide','eye-off'); }
      else { inp.type = 'password'; ico.setAttribute('data-lucide','eye'); }
      lucide.createIcons();
    }

    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnCadastro');
      const alertEl = document.getElementById('alert');
      const successEl = document.getElementById('success');
      alertEl.style.display = 'none';
      successEl.style.display = 'none';

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const plano = document.getElementById('plano').value;
      const senha = document.getElementById('senha').value;
      const senha2 = document.getElementById('senha2').value;

      if (senha !== senha2) {
        alertEl.textContent = 'As senhas não conferem';
        alertEl.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Criando conta...';
      lucide.createIcons();

      try {
        // 1. Criar auth user
        const { data: authData, error: authErr } = await supabase.auth.signUp({
          email,
          password: senha,
          options: { data: { nome, tipo: 'personal' } }
        });
        if (authErr) throw authErr;

        // 2. Criar registro na tabela users
        const { error: userErr } = await supabase.from('users').insert({
          auth_id: authData.user.id,
          email,
          nome,
          tipo: 'personal'
        });
        if (userErr) throw userErr;

        // 3. Buscar user_id criado
        const { data: userData } = await supabase
          .from('users')
          .select('id')
          .eq('auth_id', authData.user.id)
          .single();

        // 4. Criar registro do personal com trial 7 dias
        const vencimento = new Date();
        vencimento.setDate(vencimento.getDate() + 7);

        const { error: personalErr } = await supabase.from('personals').insert({
          user_id: userData.id,
          telefone,
          plano,
          status_assinatura: 'trial',
          data_vencimento: vencimento.toISOString().split('T')[0]
        });
        if (personalErr) throw personalErr;

        // Redirecionar ao dashboard
        window.location.href = 'personal/dashboard.html';

      } catch (err) {
        let msg = err.message;
        if (msg.includes('already registered')) msg = 'Este email já está cadastrado';
        alertEl.textContent = msg;
        alertEl.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="user-plus"></i> Criar minha conta';
        lucide.createIcons();
      }
    });
  </script>
  <script>lucide.createIcons();</script>
  <style>.spin { animation: spin 1s linear infinite; } @keyframes spin { to { transform:rotate(360deg); } }</style>
</body>
</html>

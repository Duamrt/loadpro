<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dieta — LoadPro</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03281827">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03281827"></script>
  <style>
    .meal-card { padding:16px; margin-bottom:12px; }
    .meal-check { width:44px; height:44px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; }
    .meal-check.done { background:var(--success); border-color:var(--success); }
  </style>
</head>
<body>
  <div class="aluno-main">
    <h2 style="margin-bottom:20px"><i data-lucide="utensils" style="width:22px;height:22px;color:var(--success);vertical-align:-3px"></i> Minha Dieta</h2>

    <!-- Macros do dia -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-around;text-align:center">
        <div><div style="font-size:1.3rem;font-weight:800;color:var(--primary)" id="metaKcal">—</div><div style="font-size:.7rem;color:var(--text-muted)">kcal/dia</div></div>
        <div><div style="font-size:1.3rem;font-weight:800;color:var(--success)" id="metaProt">—</div><div style="font-size:.7rem;color:var(--text-muted)">Proteína</div></div>
        <div><div style="font-size:1.3rem;font-weight:800;color:var(--warning)" id="metaCarb">—</div><div style="font-size:.7rem;color:var(--text-muted)">Carbo</div></div>
        <div><div style="font-size:1.3rem;font-weight:800;color:var(--danger)" id="metaGord">—</div><div style="font-size:.7rem;color:var(--text-muted)">Gordura</div></div>
      </div>
    </div>

    <!-- Progresso -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="progress-bar" style="flex:1;height:10px">
        <div class="progress-bar-fill" id="progressBar" style="width:0%;background:var(--success)"></div>
      </div>
      <span style="font-size:.85rem;font-weight:600" id="progressLabel">0%</span>
    </div>

    <!-- Refeições -->
    <div id="refeicoesContainer"></div>

    <!-- Suplementos -->
    <div id="suplementosContainer" style="margin-top:24px"></div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><i data-lucide="home"></i>Início</a>
    <a href="treino.html"><i data-lucide="dumbbell"></i>Treino</a>
    <a href="dieta.html" class="active"><i data-lucide="utensils"></i>Dieta</a>
    <a href="chat.html"><i data-lucide="message-circle"></i>Chat</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03281827"></script>
  <script src="../js/supabase.js?v=03281827"></script>
  <script src="../js/auth.js?v=03281827"></script>
  <script src="../js/utils.js?v=03281827"></script>
  <script>
    let refeicoes = [];
    let checksMap = {};

    document.addEventListener('auth-ready', async () => {
      const aluno = window.currentAluno;
      if (!aluno) return;
      const hoje = new Date().toISOString().split('T')[0];

      // Plano ativo
      const { data: plano } = await supabase
        .from('planos_dieta')
        .select('*, refeicoes(*)')
        .eq('aluno_id', aluno.id)
        .eq('ativo', true)
        .single();

      if (!plano) {
        document.getElementById('refeicoesContainer').innerHTML = '<div class="empty-state"><i data-lucide="utensils"></i><h3>Sem plano alimentar</h3><p>Seu personal ainda não criou um plano pra você.</p></div>';
        lucide.createIcons();
        return;
      }

      document.getElementById('metaKcal').textContent = plano.meta_kcal || '—';
      document.getElementById('metaProt').textContent = plano.proteina_g ? plano.proteina_g + 'g' : '—';
      document.getElementById('metaCarb').textContent = plano.carboidrato_g ? plano.carboidrato_g + 'g' : '—';
      document.getElementById('metaGord').textContent = plano.gordura_g ? plano.gordura_g + 'g' : '—';

      refeicoes = (plano.refeicoes || []).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

      // Buscar checklist de hoje
      const { data: checks } = await supabase
        .from('dieta_checklist')
        .select('*')
        .eq('aluno_id', aluno.id)
        .eq('data', hoje);

      (checks || []).forEach(c => { checksMap[c.refeicao_id] = c; });

      renderRefeicoes();

      // Suplementos
      const { data: sups } = await supabase
        .from('suplementos')
        .select('*')
        .eq('aluno_id', aluno.id)
        .eq('ativo', true);

      if (sups?.length) {
        const { data: supChecks } = await supabase
          .from('suplemento_checklist')
          .select('*')
          .eq('aluno_id', aluno.id)
          .eq('data', hoje);

        const supMap = {};
        (supChecks || []).forEach(c => { supMap[c.suplemento_id] = c; });

        document.getElementById('suplementosContainer').innerHTML = `
          <h3 style="margin-bottom:12px"><i data-lucide="pill" style="width:18px;height:18px;color:var(--primary);vertical-align:-3px"></i> Suplementos</h3>
          ${sups.map(s => {
            const done = supMap[s.id]?.tomado;
            return `
              <div class="card meal-card" style="display:flex;align-items:center;gap:12px">
                <div class="meal-check ${done ? 'done' : ''}" onclick="toggleSup('${s.id}', ${!done})">
                  <i data-lucide="check" style="width:14px;height:14px;color:#fff"></i>
                </div>
                <div style="flex:1">
                  <div style="font-weight:600">${esc(s.nome)}</div>
                  <div style="font-size:.8rem;color:var(--text-muted)">${esc(s.dosagem || '')} ${s.horario ? '· ' + s.horario : ''}</div>
                </div>
              </div>
            `;
          }).join('')}
        `;
      }

      lucide.createIcons();
    });

    function renderRefeicoes() {
      const total = refeicoes.length;
      const done = Object.values(checksMap).filter(c => c.feita).length;
      const pct = total ? Math.round(done / total * 100) : 0;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = pct + '%';

      document.getElementById('refeicoesContainer').innerHTML = refeicoes.map(r => {
        const check = checksMap[r.id];
        const isDone = check?.feita;
        return `
          <div class="card meal-card" style="${isDone ? 'opacity:.6' : ''}">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:${r.descricao ? '8px' : '0'}">
              <div class="meal-check ${isDone ? 'done' : ''}" onclick="toggleRefeicao('${r.id}', ${!isDone})">
                <i data-lucide="check" style="width:14px;height:14px;color:#fff"></i>
              </div>
              <div style="flex:1">
                <div style="font-weight:600;${isDone ? 'text-decoration:line-through' : ''}">${esc(r.nome)}</div>
                ${r.horario ? `<div style="font-size:.8rem;color:var(--text-muted)">${r.horario}</div>` : ''}
              </div>
              ${r.calorias ? `<span style="font-size:.8rem;color:var(--text-secondary)">${r.calorias} kcal</span>` : ''}
            </div>
            ${r.descricao ? `<div style="font-size:.85rem;color:var(--text-secondary);padding-left:40px;white-space:pre-line">${esc(r.descricao)}</div>` : ''}
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function toggleRefeicao(refId, feita) {
      const aluno = window.currentAluno;
      const hoje = new Date().toISOString().split('T')[0];

      if (checksMap[refId]) {
        await supabase.from('dieta_checklist').update({ feita }).eq('id', checksMap[refId].id);
        checksMap[refId].feita = feita;
      } else {
        const { data } = await supabase.from('dieta_checklist').insert({
          aluno_id: aluno.id, refeicao_id: refId, data: hoje, feita
        }).select().single();
        checksMap[refId] = data;
      }
      renderRefeicoes();
    }

    async function toggleSup(supId, tomado) {
      const aluno = window.currentAluno;
      const hoje = new Date().toISOString().split('T')[0];

      const { data: existing } = await supabase
        .from('suplemento_checklist')
        .select('id').eq('aluno_id', aluno.id).eq('suplemento_id', supId).eq('data', hoje).single();

      if (existing) {
        await supabase.from('suplemento_checklist').update({ tomado }).eq('id', existing.id);
      } else {
        await supabase.from('suplemento_checklist').insert({ aluno_id: aluno.id, suplemento_id: supId, data: hoje, tomado });
      }
      location.reload();
    }
  </script>
</body>
</html>

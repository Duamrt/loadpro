<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Treinos — LoadPro</title>
  <meta name="theme-color" content="#F5F0E8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Satoshi:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03291336">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03291336"></script>
<script>if(localStorage.getItem("loadpro-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
</head>
<body>
  <div style="padding:16px" class="aluno-main">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div>
        <div style="font-size:.85rem;color:var(--text-muted)" id="greeting"></div>
        <h2 id="userName" style="margin-top:4px"></h2>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="toggleThemeAluno()" id="btnTheme" style="background:none;border:none;cursor:pointer;font-size:1.1rem;padding:6px">🌙</button>
        <div class="avatar" id="userAvatar" style="width:44px;height:44px"></div>
      </div>
    </div>

    <!-- Treino de hoje -->
    <div class="card" style="margin-bottom:16px;border-left:3px solid var(--primary)">
      <h4 style="margin-bottom:12px"><i data-lucide="dumbbell" style="width:18px;height:18px;color:var(--primary);vertical-align:-3px"></i> Treino de Hoje</h4>
      <div id="treinoHoje">
        <div class="skeleton" style="height:60px"></div>
      </div>
    </div>

    <!-- Resumo rápido -->
    <div class="grid grid-2 stats-keep" style="margin-bottom:16px">
      <div class="card stat-card" style="padding:16px">
        <div class="stat-value" style="font-size:1.5rem" id="streak">0</div>
        <div class="stat-label">Dias seguidos</div>
      </div>
      <div class="card stat-card" style="padding:16px">
        <div class="stat-value" style="font-size:1.5rem;color:var(--success)" id="semana">0</div>
        <div class="stat-label">Treinos esta semana</div>
      </div>
    </div>

    <!-- Dieta resumo -->
    <div class="card" style="margin-bottom:16px">
      <h4 style="margin-bottom:12px"><i data-lucide="utensils" style="width:18px;height:18px;color:var(--success);vertical-align:-3px"></i> Dieta de Hoje</h4>
      <div id="dietaHoje">
        <p style="font-size:.9rem;color:var(--text-muted)">Nenhum plano alimentar ativo</p>
      </div>
    </div>

    <!-- Histórico de treinos -->
    <div class="card" style="margin-bottom:16px">
      <h4 style="margin-bottom:12px"><i data-lucide="history" style="width:18px;height:18px;color:var(--warning);vertical-align:-3px"></i> Últimos Treinos</h4>
      <div id="historicoTreinos">
        <p style="font-size:.9rem;color:var(--text-muted)">Nenhum treino registrado</p>
      </div>
    </div>

    <!-- Água -->
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h4><i data-lucide="droplets" style="width:18px;height:18px;color:#3b82f6;vertical-align:-3px"></i> Água</h4>
        <span id="aguaLabel" style="font-size:.9rem;color:var(--text-secondary)">0 / 3000 ml</span>
      </div>
      <div class="progress-bar" style="height:12px;margin-bottom:12px">
        <div class="progress-bar-fill" id="aguaBar" style="width:0%;background:#3b82f6"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-sm btn-secondary" onclick="addAgua(200)">+200ml</button>
        <button class="btn btn-sm btn-secondary" onclick="addAgua(300)">+300ml</button>
        <button class="btn btn-sm btn-secondary" onclick="addAgua(500)">+500ml</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="active"><i data-lucide="home"></i>Início</a>
    <a href="treino.html"><i data-lucide="dumbbell"></i>Treino</a>
    <a href="dieta.html"><i data-lucide="utensils"></i>Dieta</a>
    <a href="chat.html"><i data-lucide="message-circle"></i>Chat</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03291336"></script>
  <script src="../js/supabase.js?v=03291336"></script>
  <script src="../js/auth.js?v=03291336"></script>
  <script src="../js/utils.js?v=03291336"></script>
  <script>
    document.addEventListener('auth-ready', async () => {
      const user = window.currentUser;
      const aluno = window.currentAluno;
      if (!aluno) return;

      const hora = new Date().getHours();
      document.getElementById('greeting').textContent = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
      document.getElementById('userName').textContent = user.nome.split(' ')[0];
      document.getElementById('userAvatar').textContent = getInitials(user.nome);

      const hoje = new Date().toISOString().split('T')[0];
      const diaSemana = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'][new Date().getDay()];

      // Treino de hoje (rotina ativa com dia de hoje)
      const { data: rotinas } = await supabase
        .from('rotinas')
        .select('*, rotina_exercicios(*, exercicios(nome, grupo_muscular))')
        .eq('aluno_id', aluno.id)
        .eq('ativa', true)
        .contains('dias_semana', [diaSemana]);

      // Buscar horário da agenda pra hoje
      const { data: agendaHoje } = await supabase
        .from('agenda')
        .select('horario')
        .eq('aluno_id', aluno.id)
        .eq('dia_semana', diaSemana)
        .eq('ativo', true)
        .limit(1);

      const horarioTreino = agendaHoje?.[0]?.horario?.substring(0, 5);

      if (rotinas?.length) {
        const r = rotinas[0];
        const exs = (r.rotina_exercicios || []).sort((a, b) => a.ordem - b.ordem);
        document.getElementById('treinoHoje').innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-weight:600;font-size:1.1rem">${esc(r.nome)}</div>
            ${horarioTreino ? `<span style="font-size:.9rem;font-weight:600;color:var(--primary)"><i data-lucide="clock" style="width:14px;height:14px;vertical-align:-2px"></i> ${horarioTreino}</span>` : ''}
          </div>
          <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:12px">${exs.length} exercícios</div>
          <a href="treino.html?rotina=${r.id}" class="btn btn-primary btn-block"><i data-lucide="play"></i> Iniciar Treino</a>
        `;
      } else {
        document.getElementById('treinoHoje').innerHTML = '<p style="font-size:.9rem;color:var(--text-muted)">Sem treino programado para hoje. Descanse!</p>';
      }

      // Treinos da semana
      const inicioSemana = new Date();
      inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay());
      const { count } = await supabase
        .from('treino_logs')
        .select('id', { count: 'exact', head: true })
        .eq('aluno_id', aluno.id)
        .gte('data', inicioSemana.toISOString().split('T')[0]);
      document.getElementById('semana').textContent = count || 0;

      // Calcular meta de água baseado no peso (35ml × kg)
      let metaAgua = 3000;
      const { data: avalAgua } = await supabase
        .from('avaliacoes').select('peso')
        .eq('aluno_id', aluno.id).order('data', { ascending: false }).limit(1).single();
      if (avalAgua?.peso) metaAgua = Math.round(avalAgua.peso * 50);

      // Água
      const { data: agua } = await supabase
        .from('agua_log')
        .select('*')
        .eq('aluno_id', aluno.id)
        .eq('data', hoje)
        .single();

      if (agua) updateAgua(agua.consumido_ml, agua.meta_ml || metaAgua);
      else updateAgua(0, metaAgua);

      // Histórico de treinos (últimos 5)
      const { data: historico } = await supabase
        .from('treino_logs')
        .select('id, data, duracao_min, completo, rotinas(nome)')
        .eq('aluno_id', aluno.id)
        .order('data', { ascending: false })
        .limit(5);

      if (historico?.length) {
        // Contar séries por treino
        const logIds = historico.map(h => h.id);
        const { data: seriesCount } = await supabase
          .from('treino_series')
          .select('treino_log_id')
          .in('treino_log_id', logIds);

        const countMap = {};
        (seriesCount || []).forEach(s => {
          countMap[s.treino_log_id] = (countMap[s.treino_log_id] || 0) + 1;
        });

        document.getElementById('historicoTreinos').innerHTML = historico.map(h => {
          const nomeRotina = h.rotinas?.nome || 'Treino';
          const series = countMap[h.id] || 0;
          const duracao = h.duracao_min ? h.duracao_min + 'min' : '';
          return `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="flex:1;cursor:pointer" onclick="verTreino('${h.id}')">
                <div style="font-weight:600;font-size:.9rem">${esc(nomeRotina)}</div>
                <div style="font-size:.8rem;color:var(--text-muted)">${formatDate(h.data)} ${duracao ? '· ' + duracao : ''} · ${series} séries</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                ${h.completo ? '<span class="badge badge-success">Completo</span>' : '<span class="badge badge-warning">Parcial</span>'}
                <button onclick="apagarTreino('${h.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px" title="Apagar treino">
                  <i data-lucide="trash-2" style="width:16px;height:16px"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      // Dieta checklist
      const { data: plano } = await supabase
        .from('planos_dieta')
        .select('*, refeicoes(*)')
        .eq('aluno_id', aluno.id)
        .eq('ativo', true)
        .single();

      if (plano?.refeicoes?.length) {
        const { data: checks } = await supabase
          .from('dieta_checklist')
          .select('*')
          .eq('aluno_id', aluno.id)
          .eq('data', hoje);

        const feitas = new Set((checks || []).filter(c => c.feita).map(c => c.refeicao_id));
        const total = plano.refeicoes.length;
        const done = feitas.size;

        document.getElementById('dietaHoje').innerHTML = `
          <div class="progress-bar" style="margin-bottom:8px">
            <div class="progress-bar-fill" style="width:${(done/total*100)}%;background:var(--success)"></div>
          </div>
          <div style="font-size:.85rem;color:var(--text-secondary)">${done} de ${total} refeições feitas</div>
        `;
      }

      lucide.createIcons();
    });

    function updateAgua(consumido, meta) {
      document.getElementById('aguaLabel').textContent = `${consumido} / ${meta} ml`;
      document.getElementById('aguaBar').style.width = `${Math.min(100, consumido / meta * 100)}%`;
    }

    async function addAgua(ml) {
      const aluno = window.currentAluno;
      const hoje = new Date().toISOString().split('T')[0];

      const { data: existing } = await supabase
        .from('agua_log')
        .select('*')
        .eq('aluno_id', aluno.id)
        .eq('data', hoje)
        .single();

      if (existing) {
        const novo = existing.consumido_ml + ml;
        await supabase.from('agua_log').update({ consumido_ml: novo }).eq('id', existing.id);
        updateAgua(novo, existing.meta_ml);
      } else {
        // Calcular meta baseado no peso
        let meta = 3000;
        const { data: av } = await supabase.from('avaliacoes').select('peso').eq('aluno_id', aluno.id).order('data', { ascending: false }).limit(1).single();
        if (av?.peso) meta = Math.round(av.peso * 50);
        await supabase.from('agua_log').insert({ aluno_id: aluno.id, data: hoje, consumido_ml: ml, meta_ml: meta });
        updateAgua(ml, meta);
      }
      showToast(`+${ml}ml de água!`);
    }

    function toggleThemeAluno() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('loadpro-theme', newTheme);
      document.getElementById('btnTheme').textContent = newTheme === 'dark' ? '☀️' : '🌙';
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = newTheme === 'dark' ? '#1A1816' : '#F5F0E8';
    }
    if (document.documentElement.getAttribute('data-theme') === 'dark') {
      document.getElementById('btnTheme').textContent = '☀️';
    }

    async function apagarTreino(logId) {
      if (!confirm('Apagar este treino do histórico?')) return;
      await supabase.from('treino_series').delete().eq('treino_log_id', logId);
      await supabase.from('treino_logs').delete().eq('id', logId);
      showToast('Treino apagado');
      location.reload();
    }

    async function verTreino(logId) {
      const { data: series } = await supabase
        .from('treino_series')
        .select('exercicio_id, serie_num, carga, reps, pr, exercicios(nome)')
        .eq('treino_log_id', logId)
        .order('exercicio_id')
        .order('serie_num');

      if (!series?.length) { showToast('Sem dados deste treino'); return; }

      // Agrupar por exercício
      const grupos = {};
      series.forEach(s => {
        const nome = s.exercicios?.nome || 'Exercício';
        if (!grupos[nome]) grupos[nome] = [];
        grupos[nome].push(s);
      });

      let html = '';
      for (const [nome, ss] of Object.entries(grupos)) {
        html += `<div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:.9rem;margin-bottom:6px">${esc(nome)}</div>
          ${ss.map(s => `
            <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;color:var(--text-secondary)">
              <span>Série ${s.serie_num}</span>
              <span style="font-weight:600">${s.carga || 0}kg × ${s.reps} ${s.pr ? '🏆' : ''}</span>
            </div>
          `).join('')}
        </div>`;
      }

      // Modal simples
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay active';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="modal" style="max-width:400px">
          <div class="modal-header">
            <h3>Detalhes do Treino</h3>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          </div>
          <div class="modal-body">${html}</div>
        </div>`;
      document.body.appendChild(overlay);
    }
  </script>
</body>
</html>

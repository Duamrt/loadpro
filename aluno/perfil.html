<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — LoadPro</title>
  <meta name="theme-color" content="#F5F0E8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Satoshi:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03291338">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03291338"></script>
<script>if(localStorage.getItem("loadpro-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
</head>
<body>
  <div class="aluno-main">
    <div style="text-align:center;margin-bottom:24px">
      <div class="avatar avatar-lg" style="margin:0 auto 12px;width:80px;height:80px;font-size:2rem" id="perfilAvatar"></div>
      <h2 id="perfilNome"></h2>
      <p style="font-size:.9rem" id="perfilObj"></p>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h4 style="margin-bottom:12px">Meus Dados</h4>
      <div class="form-group">
        <label>Nome</label>
        <input type="text" class="form-control" id="pNome">
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" class="form-control" id="pTelefone">
      </div>
      <button class="btn btn-primary btn-block" onclick="salvarPerfil()"><i data-lucide="save"></i> Salvar</button>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h4 style="margin-bottom:12px">Alterar Senha</h4>
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" class="form-control" id="pSenha" minlength="6">
      </div>
      <button class="btn btn-secondary btn-block" onclick="alterarSenha()"><i data-lucide="lock"></i> Alterar</button>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h4 style="margin-bottom:12px">Meu Personal</h4>
      <div id="meuPersonal" style="font-size:.9rem;color:var(--text-secondary)">Carregando...</div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h4>Modo Escuro</h4>
        <button onclick="toggleThemeAluno()" id="btnTheme" style="background:none;border:none;cursor:pointer;font-size:1.2rem;padding:8px">🌙</button>
      </div>
    </div>

    <button class="btn btn-danger btn-block" onclick="sair()"><i data-lucide="log-out"></i> Sair</button>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><i data-lucide="home"></i>Início</a>
    <a href="treino.html"><i data-lucide="dumbbell"></i>Treino</a>
    <a href="dieta.html"><i data-lucide="utensils"></i>Dieta</a>
    <a href="chat.html"><i data-lucide="message-circle"></i>Chat</a>
    <a href="perfil.html" class="active"><i data-lucide="user"></i>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03291338"></script>
  <script src="../js/supabase.js?v=03291338"></script>
  <script src="../js/auth.js?v=03291338"></script>
  <script src="../js/utils.js?v=03291338"></script>
  <script>
    document.addEventListener('auth-ready', async () => {
      const user = window.currentUser;
      const aluno = window.currentAluno;

      document.getElementById('perfilAvatar').textContent = getInitials(user.nome);
      document.getElementById('perfilNome').textContent = user.nome;
      document.getElementById('perfilObj').textContent = aluno?.objetivo || '';
      document.getElementById('pNome').value = user.nome;
      document.getElementById('pTelefone').value = aluno?.telefone || '';
      maskPhone(document.getElementById('pTelefone'));

      // Personal info
      if (aluno?.personal_id) {
        const { data: personal } = await supabase
          .from('personals')
          .select('*, users(nome)')
          .eq('id', aluno.personal_id)
          .single();
        if (personal) {
          document.getElementById('meuPersonal').textContent = personal.users?.nome || 'Personal Trainer';
        }
      }

      lucide.createIcons();
    });

    async function salvarPerfil() {
      const nome = document.getElementById('pNome').value.trim();
      const telefone = document.getElementById('pTelefone').value.trim();
      await supabase.from('users').update({ nome }).eq('id', window.currentUser.id);
      await supabase.from('alunos').update({ telefone, nome }).eq('id', window.currentAluno.id);
      showToast('Perfil atualizado!');
    }

    async function alterarSenha() {
      const nova = document.getElementById('pSenha').value;
      if (nova.length < 6) { showToast('Mínimo 6 caracteres', 'error'); return; }
      const { error } = await supabase.auth.updateUser({ password: nova });
      if (error) { showToast('Erro: ' + error.message, 'error'); return; }
      showToast('Senha alterada!');
      document.getElementById('pSenha').value = '';
    }

    function toggleThemeAluno() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('loadpro-theme', newTheme);
      document.getElementById('btnTheme').textContent = newTheme === 'dark' ? '☀️' : '🌙';
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = newTheme === 'dark' ? '#1A1816' : '#F5F0E8';
    }
    // Atualizar ícone ao carregar
    if (document.documentElement.getAttribute('data-theme') === 'dark') {
      document.getElementById('btnTheme').textContent = '☀️';
    }

    async function sair() {
      await supabase.auth.signOut();
      window.location.href = '../login.html';
    }
  </script>
</body>
</html>

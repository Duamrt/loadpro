<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino — LoadPro</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=03290511">
  <link rel="manifest" href="../manifest.json">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03290511"></script>
  <style>
    .serie-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .serie-input { width:70px; padding:8px; text-align:center; -moz-appearance:textfield; }
    .serie-input::-webkit-inner-spin-button, .serie-input::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    .serie-check { width:44px; height:44px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; }
    .serie-check.done { background:var(--success); border-color:var(--success); }
    @media (max-width:360px) { .serie-input { width:56px; padding:6px; font-size:.85rem; } }
    .timer-display { font-size:2rem; font-weight:800; color:var(--primary); text-align:center; font-variant-numeric:tabular-nums; }
    /* Tipo de série badges */
    .serie-tipo { width:36px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:800; cursor:pointer; flex-shrink:0; transition:all .15s; border:none; }
    .serie-tipo-W { background:var(--warning-light); color:var(--warning); }
    .serie-tipo-1 { background:var(--primary-light); color:var(--primary); }
    .serie-tipo-F { background:var(--danger-light); color:var(--danger); }
    .serie-tipo-D { background:var(--success-light); color:var(--success); }
    .serie-anterior { font-size:.7rem; color:var(--text-muted); text-align:center; min-width:70px; flex-shrink:0; }
    /* PSE selector */
    .pse-btn { width:36px; height:28px; border-radius:6px; background:var(--bg-card-hover); color:var(--text-muted); border:1px solid var(--border); font-size:.7rem; font-weight:700; cursor:pointer; flex-shrink:0; }
    .pse-btn.rated { background:var(--primary-light); color:var(--primary); border-color:var(--primary); }
    /* PR celebration */
    .pr-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#f97316,#eab308); color:#fff; font-size:.7rem; font-weight:800; padding:3px 8px; border-radius:100px; margin-left:8px; animation:prPop .5s ease; }
    @keyframes prPop { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.3)} 100%{transform:scale(1);opacity:1} }
    .pr-toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:9999; background:rgba(0,0,0,.9); border:2px solid #f97316; border-radius:20px; padding:32px 48px; text-align:center; animation:prToastIn .4s ease; pointer-events:none; }
    .pr-toast .trophy { font-size:48px; margin-bottom:8px; animation:prBounce 1s ease infinite; }
    .pr-toast .pr-text { font-size:1.1rem; font-weight:800; color:#f97316; }
    .pr-toast .pr-detail { font-size:.85rem; color:#a1a1aa; margin-top:4px; }
    @keyframes prToastIn { 0%{transform:translate(-50%,-50%) scale(0);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
    @keyframes prBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  </style>
</head>
<body>
  <div class="aluno-main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <a href="dashboard.html" style="color:var(--text-muted)"><i data-lucide="arrow-left"></i></a>
      <h2 id="rotinaTitle">Treino</h2>
      <div id="timerSmall" style="font-size:.9rem;font-weight:700;color:var(--primary)">00:00</div>
    </div>

    <!-- Timer de descanso -->
    <div class="card" id="restTimer" style="display:none;margin-bottom:16px;text-align:center;padding:20px">
      <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:8px">Descanso</div>
      <div class="timer-display" id="restDisplay">01:00</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
        <button class="btn btn-sm btn-secondary" onclick="adjustRest(-15)">-15s</button>
        <button class="btn btn-sm btn-primary" onclick="skipRest()">Pular</button>
        <button class="btn btn-sm btn-secondary" onclick="adjustRest(15)">+15s</button>
      </div>
    </div>

    <!-- Exercícios -->
    <div id="exerciciosContainer"></div>

    <!-- Botão finalizar -->
    <button class="btn btn-success btn-block btn-lg" id="btnFinalizar" style="margin-top:20px;display:none" onclick="finalizarTreino()">
      <i data-lucide="check-circle"></i> Finalizar Treino
    </button>

    <!-- Selecionar rotina (se não veio da URL) -->
    <div id="seletorRotina" style="display:none">
      <h3 style="margin-bottom:16px">Suas rotinas</h3>
      <div id="listaRotinas"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><i data-lucide="home"></i>Início</a>
    <a href="treino.html" class="active"><i data-lucide="dumbbell"></i>Treino</a>
    <a href="dieta.html"><i data-lucide="utensils"></i>Dieta</a>
    <a href="chat.html"><i data-lucide="message-circle"></i>Chat</a>
    <a href="perfil.html"><i data-lucide="user"></i>Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03290511"></script>
  <script src="../js/supabase.js?v=03290511"></script>
  <script src="../js/auth.js?v=03290511"></script>
  <script src="../js/utils.js?v=03290511"></script>
  <script>
    let rotinaAtual = null;
    let treinoLogId = null;
    let startTime = null;
    let timerInterval = null;
    let restInterval = null;
    let seriesState = [];

    document.addEventListener('auth-ready', async () => {
      const aluno = window.currentAluno;
      if (!aluno) return;

      const params = new URLSearchParams(location.search);
      const rotinaId = params.get('rotina');

      if (rotinaId) {
        await iniciarTreino(rotinaId);
      } else {
        // Mostrar lista de rotinas
        document.getElementById('seletorRotina').style.display = 'block';
        const { data: rotinas } = await supabase
          .from('rotinas')
          .select('*, rotina_exercicios(id)')
          .eq('aluno_id', aluno.id)
          .eq('ativa', true);

        document.getElementById('listaRotinas').innerHTML = (rotinas || []).map(r => `
          <div class="card card-clickable" style="margin-bottom:12px" onclick="iniciarTreino('${r.id}')">
            <div style="font-weight:600;font-size:1.1rem">${esc(r.nome)}</div>
            <div style="font-size:.85rem;color:var(--text-muted)">${(r.rotina_exercicios || []).length} exercícios · ${(r.dias_semana || []).join(', ')}</div>
          </div>
        `).join('') || '<p style="color:var(--text-muted)">Nenhuma rotina ativa. Peça ao seu personal.</p>';
      }

      lucide.createIcons();
    });

    async function iniciarTreino(rotinaId) {
      document.getElementById('seletorRotina').style.display = 'none';

      const { data: rotina } = await supabase
        .from('rotinas')
        .select('*, rotina_exercicios(*, exercicios(nome, grupo_muscular, gif_url))')
        .eq('id', rotinaId)
        .single();

      if (!rotina) { showToast('Rotina não encontrada', 'error'); return; }
      rotinaAtual = rotina;

      document.getElementById('rotinaTitle').textContent = rotina.nome;

      // Criar treino_log
      const { data: log } = await supabase.from('treino_logs').insert({
        aluno_id: window.currentAluno.id,
        rotina_id: rotinaId,
        data: new Date().toISOString().split('T')[0]
      }).select().single();
      treinoLogId = log.id;

      // Buscar cargas do ÚLTIMO treino desta rotina (não do atual que está vazio)
      const { data: logAnterior } = await supabase
        .from('treino_logs')
        .select('id')
        .eq('aluno_id', window.currentAluno.id)
        .eq('rotina_id', rotinaId)
        .neq('id', treinoLogId)
        .order('data', { ascending: false })
        .limit(1);

      let cargasAnteriores = {};
      if (logAnterior?.length) {
        const { data: seriesAnt } = await supabase
          .from('treino_series')
          .select('exercicio_id, serie_num, carga, reps')
          .eq('treino_log_id', logAnterior[0].id);
        (seriesAnt || []).forEach(s => {
          cargasAnteriores[`${s.exercicio_id}_${s.serie_num}`] = { carga: s.carga, reps: s.reps };
        });
      }

      // Iniciar timer
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const sec = String(elapsed % 60).padStart(2, '0');
        document.getElementById('timerSmall').textContent = `${min}:${sec}`;
      }, 1000);

      // Renderizar exercícios
      const exercicios = (rotina.rotina_exercicios || []).sort((a, b) => a.ordem - b.ordem);
      seriesState = [];

      document.getElementById('exerciciosContainer').innerHTML = exercicios.map((re, exIdx) => {
        const ex = re.exercicios;
        const series = [];
        for (let s = 1; s <= re.series; s++) {
          const ant = cargasAnteriores[`${re.exercicio_id}_${s}`];
          series.push({ exercicio_id: re.exercicio_id, serie_num: s, carga: ant?.carga || re.carga_sugerida || '', reps: ant?.reps || re.reps_min || 10, done: false, tipo: '1', pse: 0 });
        }
        seriesState.push(...series.map((s, i) => ({ ...s, globalIdx: seriesState.length + i, descanso: re.descanso_seg || 60 })));

        return `
          <div class="card" style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              ${ex?.gif_url ? `<img src="${esc(ex.gif_url)}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">` : ''}
              <div>
                <div style="font-weight:600">${esc(ex?.nome || 'Exercício')}</div>
                <div style="font-size:.8rem;color:var(--text-muted)">${esc(ex?.grupo_muscular || '')} · ${re.series}×${re.reps_min}-${re.reps_max} ${re.carga_sugerida ? `· ${re.carga_sugerida}kg` : ''} · ⏱️ ${re.descanso_seg >= 60 ? Math.floor(re.descanso_seg/60) + ':' + String(re.descanso_seg%60).padStart(2,'0') : re.descanso_seg + 's'}</div>
              </div>
            </div>
            ${re.observacoes ? `<div style="font-size:.8rem;color:var(--warning);margin-bottom:8px"><i data-lucide="info" style="width:12px;height:12px;vertical-align:-2px"></i> ${esc(re.observacoes)}</div>` : ''}
            <div class="serie-row" style="border:none;padding:4px 0;font-size:.7rem;font-weight:600;color:var(--text-muted)">
              <div style="width:36px;flex-shrink:0">Tipo</div>
              <div class="serie-anterior">Anterior</div>
              <div class="serie-input" style="border:none;background:none;color:var(--text-muted);font-weight:600;font-size:.7rem;padding:0">Carga</div>
              <div class="serie-input" style="border:none;background:none;color:var(--text-muted);font-weight:600;font-size:.7rem;padding:0">Reps</div>
              <div style="width:36px;flex-shrink:0;text-align:center">PSE</div>
              <div style="width:44px;flex-shrink:0"></div>
            </div>
            ${series.map((s, sIdx) => {
              const gIdx = seriesState.findIndex(ss => ss.exercicio_id === s.exercicio_id && ss.serie_num === s.serie_num);
              const ant = cargasAnteriores[`${re.exercicio_id}_${s.serie_num}`];
              const antLabel = ant ? `${ant.carga}kg×${ant.reps}` : '—';
              return `
                <div class="serie-row" id="serie-${gIdx}">
                  <button class="serie-tipo serie-tipo-1" id="tipo-${gIdx}" onclick="ciclaTipo(${gIdx})" title="Tipo de série">1</button>
                  <div class="serie-anterior">${antLabel}</div>
                  <input type="number" class="form-control serie-input" value="${s.carga}" onchange="seriesState[${gIdx}].carga=+this.value" placeholder="kg" inputmode="decimal">
                  <input type="number" class="form-control serie-input" value="${s.reps}" onchange="seriesState[${gIdx}].reps=+this.value" placeholder="reps" inputmode="numeric">
                  <button class="pse-btn" id="pse-${gIdx}" onclick="selecionaPSE(${gIdx})" title="Esforço percebido">—</button>
                  <div class="serie-check" id="check-${gIdx}" onclick="completarSerie(${gIdx})">
                    <i data-lucide="check" style="width:16px;height:16px;color:#fff"></i>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');

      // Atualizar seriesState indices
      let idx = 0;
      exercicios.forEach(re => {
        for (let s = 1; s <= re.series; s++) {
          if (seriesState[idx]) seriesState[idx].descanso = re.descanso_seg || 60;
          idx++;
        }
      });

      document.getElementById('btnFinalizar').style.display = 'block';
      lucide.createIcons();
    }

    async function completarSerie(idx) {
      const s = seriesState[idx];
      if (s.done) return;
      s.done = true;

      // Atualizar carga/reps do input (pode ter mudado)
      const row = document.getElementById(`serie-${idx}`);
      const inputs = row?.querySelectorAll('.serie-input');
      if (inputs?.length >= 2) {
        s.carga = +inputs[0].value || 0;
        s.reps = +inputs[1].value || 0;
      }

      const check = document.getElementById(`check-${idx}`);
      check.classList.add('done');

      const carga = s.carga || 0;
      const reps = s.reps || 0;
      const volume = carga * reps;

      // Salvar série no banco (tipo e pse opcionais)
      const insertData = {
        treino_log_id: treinoLogId,
        exercicio_id: s.exercicio_id,
        serie_num: s.serie_num,
        reps,
        carga,
        concluida: true
      };
      if (s.tipo && s.tipo !== '1') insertData.tipo_serie = s.tipo;
      if (s.pse > 0) insertData.pse = s.pse;
      const { error: serieErr } = await supabase.from('treino_series').insert(insertData);
      if (serieErr) showToast('Erro ao salvar série', 'error');

      // Verificar PR em tempo real (carga OU volume)
      if (carga > 0) {
        const { data: prAnterior } = await supabase
          .from('treino_series')
          .select('carga, reps')
          .eq('exercicio_id', s.exercicio_id)
          .eq('concluida', true)
          .neq('treino_log_id', treinoLogId)
          .order('carga', { ascending: false })
          .limit(1);

        const cargaAnterior = prAnterior?.[0]?.carga || 0;
        const volAnterior = (prAnterior?.[0]?.carga || 0) * (prAnterior?.[0]?.reps || 0);

        let prTipo = null;
        if (carga > cargaAnterior) prTipo = 'carga';
        else if (volume > volAnterior && carga >= cargaAnterior) prTipo = 'volume';

        if (prTipo) {
          // Marcar como PR no banco
          await supabase.from('treino_series')
            .update({ pr: true })
            .eq('treino_log_id', treinoLogId)
            .eq('exercicio_id', s.exercicio_id)
            .eq('serie_num', s.serie_num);

          // Badge na série
          check.insertAdjacentHTML('afterend', '<span class="pr-badge">🏆 PR!</span>');

          // Celebração central
          const label = prTipo === 'carga'
            ? `${carga}kg — novo recorde de carga!`
            : `${volume}kg vol — novo recorde de volume!`;
          mostrarPRCelebration(label);
        }
      }

      // Iniciar timer de descanso
      startRestTimer(s.descanso);
    }

    // Alerta sonoro — funciona com fone, por cima da música
    function playRestBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // 3 beeps curtos
        [0, 0.2, 0.4].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880; // A5
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.12);
        });
      } catch(e) {}
    }

    function startRestTimer(seconds) {
      clearInterval(restInterval);
      let remaining = seconds;
      const timerEl = document.getElementById('restTimer');
      const displayEl = document.getElementById('restDisplay');
      timerEl.style.display = 'block';

      const update = () => {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        displayEl.textContent = `${m}:${s}`;
        // Beep nos últimos 3 segundos + beep final
        if (remaining <= 3 && remaining > 0) {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 660;
            gain.gain.value = 0.15;
            osc.start(); osc.stop(ctx.currentTime + 0.08);
          } catch(e) {}
        }
        if (remaining <= 0) { playRestBeep(); skipRest(); return; }
        remaining--;
      };
      update();
      restInterval = setInterval(update, 1000);
    }

    function adjustRest(delta) {
      // Simple adjust — just restart with modified time
      const current = document.getElementById('restDisplay').textContent.split(':');
      let sec = parseInt(current[0]) * 60 + parseInt(current[1]) + delta;
      if (sec < 0) sec = 0;
      startRestTimer(sec);
    }

    function skipRest() {
      clearInterval(restInterval);
      document.getElementById('restTimer').style.display = 'none';
    }

    // Tipo de série: cicla W → 1 → F → D
    const TIPOS_SERIE = [
      { key: '1', label: '1', nome: 'Normal' },
      { key: 'W', label: 'W', nome: 'Aquecimento' },
      { key: 'F', label: 'F', nome: 'Falhada' },
      { key: 'D', label: 'D', nome: 'Drop' },
    ];
    function ciclaTipo(idx) {
      const s = seriesState[idx];
      const atual = s.tipo || '1';
      const i = TIPOS_SERIE.findIndex(t => t.key === atual);
      const prox = TIPOS_SERIE[(i + 1) % TIPOS_SERIE.length];
      s.tipo = prox.key;
      const btn = document.getElementById(`tipo-${idx}`);
      btn.textContent = prox.label;
      btn.className = `serie-tipo serie-tipo-${prox.key}`;
      showToast(prox.nome, 'success');
    }

    // PSE: seleciona 1-10
    function selecionaPSE(idx) {
      const s = seriesState[idx];
      const atual = s.pse || 0;
      // Cicla: — → 6 → 7 → 8 → 9 → 10 → —
      const opcoes = [0, 6, 7, 8, 9, 10];
      const i = opcoes.indexOf(atual);
      const prox = opcoes[(i + 1) % opcoes.length];
      s.pse = prox;
      const btn = document.getElementById(`pse-${idx}`);
      btn.textContent = prox || '—';
      btn.classList.toggle('rated', prox > 0);
    }

    function mostrarPRCelebration(label) {
      const el = document.createElement('div');
      el.className = 'pr-toast';
      el.innerHTML = `<div class="trophy">🏆</div><div class="pr-text">NOVO RECORDE!</div><div class="pr-detail">${esc(label)}</div>`;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2000);
      setTimeout(() => el.remove(), 2500);
    }

    async function finalizarTreino() {
      clearInterval(timerInterval);
      clearInterval(restInterval);

      const duracao = Math.floor((Date.now() - startTime) / 60000);
      const totalDone = seriesState.filter(s => s.done).length;
      const total = seriesState.length;

      await supabase.from('treino_logs').update({
        duracao_min: duracao,
        completo: totalDone === total
      }).eq('id', treinoLogId);

      // PRs já foram verificados em tempo real no completarSerie()
      const totalPRs = document.querySelectorAll('.pr-badge').length;
      const prMsg = totalPRs > 0 ? ` · ${totalPRs} PR${totalPRs > 1 ? 's' : ''} 🏆` : '';
      showToast(`Treino finalizado! ${duracao}min · ${totalDone}/${total} séries${prMsg}`);
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
    }
  </script>
</body>
</html>

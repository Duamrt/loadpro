<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>LoadPro</title>
<script>
  // Rotas curtas: /f/codigo → ficha | /c/codigo → convite
  var path = location.pathname;
  var matchFicha = path.match(/\/f\/([a-f0-9-]+)/i);
  var matchConvite = path.match(/\/c\/([a-f0-9-]+)/i);
  var code = matchFicha ? matchFicha[1] : matchConvite ? matchConvite[1] : null;
  var destino = matchFicha ? '/ficha.html' : matchConvite ? '/convite.html' : null;

  if (code && destino) {
    // Se já é UUID completo (tem hífen), redireciona direto
    if (code.includes('-')) {
      location.replace(destino + '?token=' + code);
    } else {
      // Código curto — resolver via RPC (SECURITY DEFINER, bypass RLS)
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js';
      s.onload = async function() {
        var sb = window.supabase.createClient(
          'https://sclrcxwiwfiqnxguxvbv.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjbHJjeHdpd2ZpcW54Z3V4dmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjM2NzYsImV4cCI6MjA5MDAzOTY3Nn0._sH7CVQ38LO4RTQFHGmUPpZX4Js1SYmRwjau1Hc5cTM'
        );
        var { data, error } = await sb.rpc('resolver_codigo', { p_code: code });
        console.log('404 CODE:', code, 'RPC DATA:', data, 'RPC ERROR:', error);
        var token = data || code;
        location.replace(destino + '?token=' + token);
      };
      document.head.appendChild(s);
    }
  } else {
    document.getElementById('msg').style.display = 'block';
  }
</script>
<style>
  body { background:#0a0a0a; color:#fff; font-family:Inter,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .container { text-align:center; }
  a { color:#f97316; }
</style>
</head>
<body>
<div class="container">
  <p>Redirecionando...</p>
  <div id="msg" style="display:none">
    <h2>Página não encontrada</h2>
    <p><a href="/">Voltar ao início</a></p>
  </div>
</div>
</body></html>

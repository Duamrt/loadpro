<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>LoadPro</title>
<script>
  // Rota curta: /f/87096fc0 → /ficha.html?token=87096fc0...
  var path = location.pathname;
  var match = path.match(/\/f\/([a-f0-9-]+)/i);
  if (match) {
    var code = match[1];
    // Buscar token completo no banco
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js';
    s.onload = async function() {
      var sb = window.supabase.createClient(
        'https://sclrcxwiwfiqnxguxvbv.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjbHJjeHdpd2ZpcW54Z3V4dmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjM2NzYsImV4cCI6MjA5MDAzOTY3Nn0._sH7CVQ38LO4RTQFHGmUPpZX4Js1SYmRwjau1Hc5cTM'
      );
      var { data } = await sb.from('alunos').select('convite_token').like('convite_token', code + '%').limit(1).single();
      if (data?.convite_token) {
        location.replace('/ficha.html?token=' + data.convite_token);
      } else {
        location.replace('/ficha.html?token=' + code);
      }
    };
    document.head.appendChild(s);
  } else {
    // Página não encontrada de verdade
    document.getElementById('msg').style.display = 'block';
  }
</script>
<style>
  body { background:#0a0a0a; color:#fff; font-family:Inter,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .container { text-align:center; }
  a { color:#f97316; }
</style>
</head>
<body>
<div class="container">
  <p>Redirecionando...</p>
  <div id="msg" style="display:none">
    <h2>Página não encontrada</h2>
    <p><a href="/">Voltar ao início</a></p>
  </div>
</div>
</body></html>

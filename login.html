<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — LoadPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/style.css?v=03281548">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js?v=03281548"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        
        <span style="color:var(--primary)">LOAD</span><span style="color:#fff">PRO</span>
      </div>
      <div class="card auth-card">
        <h2>Bem-vindo de volta</h2>
        <p>Entre na sua conta para continuar</p>

        <div id="alert" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>

        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <div class="pwd-wrap">
              <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
              <button type="button" class="pwd-toggle" onclick="togglePwd()"><i data-lucide="eye" id="eyeIcon"></i></button>
            </div>
          </div>
          <div style="text-align:right;margin-bottom:16px">
            <a href="recuperar.html" style="font-size:.85rem">Esqueci minha senha</a>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnLogin">
            <i data-lucide="log-in"></i> Entrar
          </button>
        </form>

        <div class="auth-footer">
          Não tem conta? <a href="cadastro.html">Criar conta grátis</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js?v=03281548"></script>
  <script src="js/supabase.js?v=03281548"></script>
  <script>
    function togglePwd() {
      const inp = document.getElementById('senha');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') { inp.type = 'text'; ico.setAttribute('data-lucide','eye-off'); }
      else { inp.type = 'password'; ico.setAttribute('data-lucide','eye'); }
      lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const alert = document.getElementById('alert');
      alert.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Entrando...';
      lucide.createIcons();

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('senha').value
        });
        if (error) throw error;

        // Buscar tipo do usuário
        const { data: user } = await supabase
          .from('users')
          .select('tipo')
          .eq('auth_id', data.user.id)
          .single();

        if (user?.tipo === 'personal') {
          window.location.href = 'personal/dashboard.html';
        } else {
          window.location.href = 'aluno/dashboard.html';
        }
      } catch (err) {
        alert.textContent = err.message === 'Invalid login credentials'
          ? 'Email ou senha incorretos'
          : err.message;
        alert.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in"></i> Entrar';
        lucide.createIcons();
      }
    });
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
